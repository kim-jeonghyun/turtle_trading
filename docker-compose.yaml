services:
  # 시그널 체크 서비스 (supercronic 기반, non-root)
  turtle-cron:
    build: .
    container_name: turtle-cron
    init: true                    # tini로 PID 1 좀비 수거 (defense-in-depth)
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-x", "supercronic"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 6m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - turtle-network

  # Streamlit 대시보드
  turtle-dashboard:
    build: .
    container_name: turtle-dashboard
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - turtle-network
    depends_on:
      - turtle-cron

networks:
  turtle-network:
    driver: bridge
